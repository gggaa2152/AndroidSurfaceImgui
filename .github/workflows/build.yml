name: Build Dual-End Binary

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download stb_image.h
        run: |
          curl -L https://raw.githubusercontent.com/nothings/stb/master/stb_image.h -o stb_image.h

      - name: Auto Setup Dobby Framework
        run: |
          echo "[*] 正在全自动拉取并修复 Dobby Hook 框架..."
          git clone --depth 1 https://github.com/jmpews/Dobby.git third_party/dobby
          
          # 【精准修复 1】：彻底解决 OSMemory 未定义问题
          # 策略：直接将 Dobby 源码中所有 OSMemory 调用替换为原生 mprotect 和常量，避开类定义陷阱
          echo "[*] 正在进行源码级代码修补..."
          sed -i '1i #include <sys/mman.h>\n#include <unistd.h>' third_party/dobby/common/os_arch_features.h
          sed -i 's/OSMemory::PageSize()/4096/g' third_party/dobby/common/os_arch_features.h
          sed -i 's/OSMemory::SetPermission(page, 4096, kReadExecute)/mprotect(page, 4096, 5) == 0/g' third_party/dobby/common/os_arch_features.h
          sed -i 's/OSMemory::SetPermission/mprotect/g' third_party/dobby/common/os_arch_features.h || true
          
          # 【精准修复 2】：热修复 arm64 汇编语法，适配 NDK 27 (Clang 18)
          # 策略：先剥离后缀，再利用正则表达式强行在符号前插入 :lo12: 前缀
          echo "[*] 正在修复 arm64 汇编 relocation 语法..."
          sed -i 's/@PAGEOFF//g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/*.asm
          sed -i 's/@PAGE//g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/*.asm
          # 针对 add 指令，强行将 symbol 替换为 :lo12:symbol
          sed -i 's/add x17, x17, \(.*\)/add x17, x17, :lo12:\1/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/*.asm

          # 【精准修复 3】：修复老版本 Dobby 中的语法残缺 (a.start 缺少括号)
          sed -i 's/a.start < b.start/a.start() < b.start()/g' third_party/dobby/source/Backend/UserMode/PlatformUtil/Linux/ProcessRuntimeUtility.cc || true

          # 自动补齐 includes 目录供你的 internal_hook.cc 使用
          mkdir -p includes
          cp third_party/dobby/include/dobby.h includes/
          
          cd third_party/dobby
          mkdir build && cd build
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          
          # 开启全局 PIC 适配，并关闭冲突插件
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$NDK_PATH \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DDOBBY_GENERATE_SHARED=OFF \
            -DPlugin.SymbolResolver=OFF \
            -DPlugin.Android.BionicLinkerUtil=OFF \
            -DDOBBY_DEBUG=OFF
          make -j4
          echo "[+] Dobby 静态库编译完成！"

      - name: Compile 64bit Dual-End Binary
        run: |
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          BIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin
          CXX=$BIN/aarch64-linux-android33-clang++
          CC=$BIN/aarch64-linux-android33-clang

          # 1. 编译内部 Hook SO (链接刚才修复成功的 libdobby.a)
          $CXX -O3 -shared -fPIC \
            internal_hook.cc \
            -I. -I./includes -I./third_party/dobby/include \
            ./third_party/dobby/build/libdobby.a \
            -llog \
            -o libJKHook.so

          # 2. 将 .so 转换为内嵌数组
          xxd -i libJKHook.so > hook_payload.h

          # 3. 编译 zstd
          $CC -O3 -fPIC -c \
            -I./third_party/zstd/lib \
            third_party/zstd/lib/common/*.c \
            third_party/zstd/lib/compress/*.c \
            third_party/zstd/lib/decompress/*.c

          # 4. 编译最终产物 (外部 UI 守护进程)
          $CXX -O3 -s -std=c++20 -static-libstdc++ \
            -DIMGUI_DEFINE_MATH_OPERATORS \
            -Wno-error=narrowing -Wno-format-security \
            -I. -I./includes -I./modules -I./third_party \
            -I./third_party/imgui -I./third_party/imgui/backends \
            -I./third_party/zstd/lib \
            -I./third_party/ImGui-SharedDrawData/modules \
            main.cc \
            src/common/*.cc \
            third_party/imgui/*.cpp \
            third_party/imgui/backends/imgui_impl_android.cpp \
            third_party/imgui/backends/imgui_impl_opengl3.cpp \
            *.o \
            -lGLESv3 -lEGL -landroid -llog \
            -o JKHelper_Daemon

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: JKHelper-DualEnd-64bit
          path: JKHelper_Daemon
