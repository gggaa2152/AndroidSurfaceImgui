name: Build Dual-End Binary

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download stb_image.h
        run: |
          curl -L https://raw.githubusercontent.com/nothings/stb/master/stb_image.h -o stb_image.h

      - name: Auto Setup Dobby Framework
        run: |
          echo "[*] 正在全自动拉取并编译 Dobby Hook 框架..."
          git clone --depth 1 https://github.com/jmpews/Dobby.git third_party/dobby
          
          # 【外科手术级修复 1】：强行补齐 Dobby 作者漏写的 OSMemory 类定义
          echo "[*] 正在注入 OSMemory 补丁..."
          cat << 'EOF' > patch.h
          #include <sys/mman.h>
          #ifndef OS_MEMORY_SHIM
          #define OS_MEMORY_SHIM
          #define kReadExecute 7
          class OSMemory {
          public:
              static int PageSize() { return 4096; }
              static bool SetPermission(void* page, int size, int perm) { return mprotect(page, size, perm) == 0; }
          };
          #endif
          EOF
          cat third_party/dobby/common/os_arch_features.h >> patch.h
          mv patch.h third_party/dobby/common/os_arch_features.h
          
          # 【外科手术级修复 2】：强行修改底层汇编，将绝对寻址替换为 PIC 兼容的 GOT 表寻址
          echo "[*] 正在热修复 ADRP 汇编指令..."
          sed -i 's/adrp x17, common_closure_bridge_handler@PAGE/adrp x17, :got:common_closure_bridge_handler/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm
          sed -i 's/add x17, x17, common_closure_bridge_handler@PAGEOFF/ldr x17, [x17, #:got_lo12:common_closure_bridge_handler]/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm
          
          sed -i 's/adrp x17, get_routing_bridge_next_hop@PAGE/adrp x17, :got:get_routing_bridge_next_hop/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_trampoline_arm64.asm
          sed -i 's/add x17, x17, get_routing_bridge_next_hop@PAGEOFF/ldr x17, [x17, #:got_lo12:get_routing_bridge_next_hop]/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_trampoline_arm64.asm
          
          # 提取头文件供我们的 internal_hook.cc 使用
          mkdir -p includes
          cp third_party/dobby/include/dobby.h includes/
          
          cd third_party/dobby
          mkdir build && cd build
          
          # 放心使用最新的 NDK 27，不再需要降级
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          
          # 开启全局 PIC 支持，完美适配新版 Clang
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$NDK_PATH \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DDOBBY_GENERATE_SHARED=OFF \
            -DPlugin.SymbolResolver=OFF
          make -j4
          echo "[+] Dobby 编译完成！"

      - name: Compile 64bit Dual-End Binary
        run: |
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          BIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin
          CXX=$BIN/aarch64-linux-android33-clang++
          CC=$BIN/aarch64-linux-android33-clang

          # 1. 编译纯净版内部 Hook SO (链接刚刚编译出的 Dobby 静态库)
          $CXX -O3 -shared -fPIC \
            internal_hook.cc \
            -I. -I./includes -I./third_party/dobby/include \
            ./third_party/dobby/build/libdobby.a \
            -llog \
            -o libJKHook.so

          # 2. 将编译好的纯净 SO 转换为十六进制数组 (hook_payload.h)
          xxd -i libJKHook.so > hook_payload.h

          # 3. 编译 zstd 库 (供 ImGui 使用)
          $CC -O3 -fPIC -c \
            -I./third_party/zstd/lib \
            third_party/zstd/lib/common/*.c \
            third_party/zstd/lib/compress/*.c \
            third_party/zstd/lib/decompress/*.c

          # 4. 编译外部 UI 守护进程 (ELF 格式)，吞入 payload
          $CXX -O3 -s -std=c++20 -static-libstdc++ \
            -DIMGUI_DEFINE_MATH_OPERATORS \
            -Wno-error=narrowing -Wno-format-security \
            -I. -I./includes -I./modules -I./third_party \
            -I./third_party/imgui -I./third_party/imgui/backends \
            -I./third_party/zstd/lib \
            -I./third_party/ImGui-SharedDrawData/modules \
            main.cc \
            src/common/*.cc \
            third_party/imgui/*.cpp \
            third_party/imgui/backends/imgui_impl_android.cpp \
            third_party/imgui/backends/imgui_impl_opengl3.cpp \
            *.o \
            -lGLESv3 -lEGL -landroid -llog \
            -o JKHelper_Daemon

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: JKHelper-DualEnd-64bit
          path: JKHelper_Daemon
