name: Build Dual-End Binary

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download stb_image.h
        run: |
          curl -L https://raw.githubusercontent.com/nothings/stb/master/stb_image.h -o stb_image.h

      - name: Auto Setup Dobby Framework
        run: |
          echo "[*] 正在全自动拉取并修复 Dobby Hook 框架..."
          git clone --depth 1 https://github.com/jmpews/Dobby.git third_party/dobby
          
          # 【修复 1】：修复 Dobby 源码中 OSMemory 未定义的逻辑错误
          # 不再手动定义类（防止重定义），而是强行插入缺失的头文件引用
          sed -i '1i #include "PlatformUnifiedInterface/platform.h"' third_party/dobby/common/os_arch_features.h || true
          
          # 【修复 2】：热修复汇编代码，适配 NDK 27 / Clang 18 的严苛语法
          # 将旧的 @PAGE 寻址替换为新版标准 ELF 寻址
          sed -i 's/adrp x17, common_closure_bridge_handler@PAGE/adrp x17, common_closure_bridge_handler/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm
          sed -i 's/add x17, x17, common_closure_bridge_handler@PAGEOFF/add x17, x17, :lo12:common_closure_bridge_handler/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm
          
          sed -i 's/adrp x17, get_routing_bridge_next_hop@PAGE/adrp x17, get_routing_bridge_next_hop/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_trampoline_arm64.asm
          sed -i 's/add x17, x17, get_routing_bridge_next_hop@PAGEOFF/add x17, x17, :lo12:get_routing_bridge_next_hop/g' third_party/dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_trampoline_arm64.asm

          # 提取头文件供我们的 internal_hook.cc 使用
          mkdir -p includes
          cp third_party/dobby/include/dobby.h includes/
          
          cd third_party/dobby
          mkdir build && cd build
          
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          
          # 【修复 3】：关键 CMake 参数
          # 开启全局位置无关代码 (PIC)，并禁用会导致重定义的 SymbolResolver 插件
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$NDK_PATH \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DDOBBY_GENERATE_SHARED=OFF \
            -DPlugin.SymbolResolver=OFF \
            -DPlugin.Android.BionicLinkerUtil=OFF
          make -j4
          echo "[+] Dobby 编译完成！"

      - name: Compile 64bit Dual-End Binary
        run: |
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -1)
          BIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin
          CXX=$BIN/aarch64-linux-android33-clang++
          CC=$BIN/aarch64-linux-android33-clang

          # 1. 编译纯净版内部 Hook SO
          $CXX -O3 -shared -fPIC \
            internal_hook.cc \
            -I. -I./includes -I./third_party/dobby/include \
            ./third_party/dobby/build/libdobby.a \
            -llog \
            -o libJKHook.so

          # 2. 将编译好的纯净 SO 转换为十六进制数组 (hook_payload.h)
          xxd -i libJKHook.so > hook_payload.h

          # 3. 编译 zstd 库 (供 ImGui 使用)
          $CC -O3 -fPIC -c \
            -I./third_party/zstd/lib \
            third_party/zstd/lib/common/*.c \
            third_party/zstd/lib/compress/*.c \
            third_party/zstd/lib/decompress/*.c

          # 4. 编译外部 UI 守护进程 (ELF 格式)，吞入 payload
          $CXX -O3 -s -std=c++20 -static-libstdc++ \
            -DIMGUI_DEFINE_MATH_OPERATORS \
            -Wno-error=narrowing -Wno-format-security \
            -I. -I./includes -I./modules -I./third_party \
            -I./third_party/imgui -I./third_party/imgui/backends \
            -I./third_party/zstd/lib \
            -I./third_party/ImGui-SharedDrawData/modules \
            main.cc \
            src/common/*.cc \
            third_party/imgui/*.cpp \
            third_party/imgui/backends/imgui_impl_android.cpp \
            third_party/imgui/backends/imgui_impl_opengl3.cpp \
            *.o \
            -lGLESv3 -lEGL -landroid -llog \
            -o JKHelper_Daemon

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: JKHelper-DualEnd-64bit
          path: JKHelper_Daemon
