name: Build Dual-End Binary

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Stable NDK 25
        run: |
          echo "[*] 正在全自动下载并安装稳定的 NDK r25c..."
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "[+] NDK 25 安装成功！"

      - name: Download stb_image.h
        run: |
          curl -L https://raw.githubusercontent.com/nothings/stb/master/stb_image.h -o stb_image.h

      - name: Auto Setup Dobby Framework
        run: |
          echo "[*] 正在全自动拉取并编译 Dobby Hook 框架..."
          git clone --depth 1 https://github.com/jmpews/Dobby.git third_party/dobby
          
          # 【自动修复头文件报错】：全自动将头文件放入 includes 目录，兼容你的 internal_hook.cc
          mkdir -p includes
          cp third_party/dobby/include/dobby.h includes/
          
          cd third_party/dobby
          mkdir build && cd build
          
          # 明确指定刚下载的 NDK 25 路径
          NDK_PATH=$ANDROID_HOME/ndk/25.2.9519653
          
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_NDK=$NDK_PATH \
            -DDOBBY_GENERATE_SHARED=OFF
          make -j4
          echo "[+] Dobby 编译完成！"

      - name: Compile 64bit Dual-End Binary
        run: |
          # 强制使用极其稳定的 NDK 25 来编译我们的代码，完美兼容 Dobby 汇编
          NDK_PATH=$ANDROID_HOME/ndk/25.2.9519653
          BIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin
          CXX=$BIN/aarch64-linux-android33-clang++
          CC=$BIN/aarch64-linux-android33-clang

          # 1. 编译纯净版内部 Hook SO (链接刚刚编译出的 Dobby 静态库)
          $CXX -O3 -shared -fPIC \
            internal_hook.cc \
            -I. -I./includes -I./third_party/dobby/include \
            ./third_party/dobby/build/libdobby.a \
            -llog \
            -o libJKHook.so

          # 2. 将编译好的纯净 SO 转换为十六进制数组 (hook_payload.h)
          xxd -i libJKHook.so > hook_payload.h

          # 3. 编译 zstd 库 (供 ImGui 使用)
          $CC -O3 -fPIC -c \
            -I./third_party/zstd/lib \
            third_party/zstd/lib/common/*.c \
            third_party/zstd/lib/compress/*.c \
            third_party/zstd/lib/decompress/*.c

          # 4. 编译外部 UI 守护进程 (ELF 格式)，吞入 payload
          $CXX -O3 -s -std=c++20 -static-libstdc++ \
            -DIMGUI_DEFINE_MATH_OPERATORS \
            -Wno-error=narrowing -Wno-format-security \
            -I. -I./includes -I./modules -I./third_party \
            -I./third_party/imgui -I./third_party/imgui/backends \
            -I./third_party/zstd/lib \
            -I./third_party/ImGui-SharedDrawData/modules \
            main.cc \
            src/common/*.cc \
            third_party/imgui/*.cpp \
            third_party/imgui/backends/imgui_impl_android.cpp \
            third_party/imgui/backends/imgui_impl_opengl3.cpp \
            *.o \
            -lGLESv3 -lEGL -landroid -llog \
            -o JKHelper_Daemon

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: JKHelper-DualEnd-64bit
          path: JKHelper_Daemon
